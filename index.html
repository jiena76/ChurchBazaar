<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vision Bazaar POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 text-white shadow-lg" style="background: linear-gradient(105deg, #f59e0b 0%, #f59e0b 45%, #166534 55%, #166534 100%)">
    <div class="max-w-md mx-auto px-4 py-4 flex items-center">
      <div class="w-14 shrink-0">
        <button onclick="showQR()" class="text-white text-xs font-black leading-tight w-12 h-12 flex items-center justify-center text-center bg-white/20 rounded-lg active:scale-95 transition">
          Zelle<br>QR
        </button>
      </div>
      <div class="text-center flex-1">
        <h1 class="text-2xl font-black tracking-wide whitespace-nowrap" style="font-family: 'Playfair Display', serif">Vision Bazaar</h1>
        <p class="text-orange-100 text-sm mt-1"><span id="cashier-display" onclick="promptCashierName()" class="cursor-pointer inline-block px-3 -mx-3 py-2 -my-2">Cashier POS</span></p>
      </div>
      <div class="w-14 shrink-0 text-right">
        <a href="history.html" class="text-orange-100 hover:text-white text-sm font-bold inline-flex items-center h-12">
          History
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-5">

    <!-- Menu -->
    <section>
      <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">Menu</h2>
      <div id="menu-grid" class="grid grid-cols-2 gap-3"></div>
    </section>

    <!-- Meal Kits -->
    <section>
      <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">Meal Kits</h2>
      <div id="mealkit-grid" class="grid grid-cols-2 gap-3"></div>
    </section>

  </main>

  <!-- Confirmation overlay (below header) -->
  <div id="confirm-overlay" class="hidden fixed left-0 right-0 bottom-0 bg-black/30 z-[55]" style="top: var(--header-h, 0px)" onclick="exitConfirmMode()"></div>

  <!-- QR (shown on Zelle tap) -->
  <section id="qr-section" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" onclick="hideQR()">
    <div class="bg-white rounded-3xl p-6 shadow-2xl flex flex-col items-center max-w-sm mx-4" onclick="event.stopPropagation()">
      <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-black mb-4">Scan to Pay via Zelle</div>
      <img src="emmanuel-church-zelle-qr-code.png" alt="Zelle QR" class="w-64 h-64 rounded-3xl border-4 border-blue-900 bg-white" />
      <div class="text-center mt-4">
        <div class="font-black text-slate-900 text-lg">Finance@kepc.org</div>
        <div class="text-sm text-slate-400 mt-1">Scan &rarr; Enter Amount &rarr; Send</div>
      </div>
      <button onclick="hideQR()" class="mt-4 px-6 py-2 bg-slate-200 text-slate-700 rounded-full font-bold text-sm">Close</button>
    </div>
  </section>

  <!-- Cashier Name Modal -->
  <section id="cashier-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center">
    <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-sm mx-4 w-full">
      <h2 class="font-black text-lg text-slate-900 text-center mb-1">캐셔 이름 입력</h2>
      <p class="text-sm text-slate-400 text-center mb-4">Enter Cashier Name</p>
      <input id="cashier-input" type="text" placeholder="이름 (Full name)" onkeydown="if(event.key==='Enter')saveCashierName()" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-base font-bold text-slate-900 focus:outline-none focus:border-blue-500 mb-4" />
      <button id="cashier-save-btn" onclick="saveCashierName()" class="w-full bg-blue-900 text-white py-3 rounded-2xl font-black active:scale-95 transition">Start</button>
    </div>
  </section>

  <!-- Bottom Sticky Cart -->
  <section id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl flex flex-col">
    <div class="max-w-md mx-auto p-4 w-full flex flex-col overflow-hidden" style="flex: 1; min-height: 0;">

      <!-- Order bar with drag handle in center -->
      <div id="cart-handle" class="grid grid-cols-3 items-center cart-handle-area">
        <div class="flex items-center gap-2 min-w-0">
          <div id="order-number" class="text-base font-black text-blue-900 whitespace-nowrap truncate shrink">Order #1001</div>
          <span id="cart-badge" class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded-full hidden whitespace-nowrap shrink-0">0 items</span>
        </div>
        <div class="flex justify-center">
          <div class="cart-expand-handle"></div>
        </div>
        <div class="text-right"><span id="cart-total" class="text-2xl font-black text-blue-900 inline-block px-2 rounded-lg">$0</span></div>
      </div>

      <!-- Expandable details -->
      <div id="cart-details" class="mt-3 hidden flex flex-col overflow-hidden" style="flex: 1; min-height: 0;">
        <div id="cart-items" class="space-y-2 overflow-y-auto mb-3 pb-1 flex-1 min-h-0">
          <div class="text-center text-slate-400 italic py-2">Cart is empty</div>
        </div>

        <div id="payment-buttons" class="flex gap-2 shrink-0">
          <button onclick="enterConfirmMode('Zelle')" class="flex-1 text-white py-4 rounded-2xl font-black text-base shadow-lg active:scale-95 transition" style="background:#6d1ed4">
            Zelle
          </button>
          <button onclick="enterConfirmMode('Cash')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-base shadow-lg active:scale-95 transition">
            Cash
          </button>
          <button onclick="clearCart()" class="w-20 bg-red-100 text-red-600 py-4 rounded-2xl font-black text-base active:scale-95 transition shrink-0">
            Clear
          </button>
        </div>
        <div id="confirm-buttons" class="hidden flex gap-2 shrink-0">
          <button id="confirm-submit-btn" onclick="confirmPayment(pendingMethod)" class="flex-1 py-4 rounded-2xl font-black text-base shadow-lg active:scale-95 transition text-white">
            Submit
          </button>
          <button onclick="exitConfirmMode()" class="w-20 bg-slate-200 text-slate-700 py-4 rounded-2xl font-black text-base active:scale-95 transition shrink-0">
            Back
          </button>
        </div>
      </div>

    </div>
  </section>

  <script src="js/pos.js"></script>
</body>
</html>
