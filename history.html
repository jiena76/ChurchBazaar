<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Order History - Vision Bazaar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 text-white shadow-lg" style="background: linear-gradient(105deg, #f59e0b 0%, #f59e0b 45%, #166534 55%, #166534 100%)">
    <div class="max-w-md mx-auto px-4 py-4 flex items-center">
      <div class="w-14 shrink-0">
        <button onclick="clearHistory()" class="text-orange-100 hover:text-white text-sm font-bold">Clear</button>
      </div>
      <div class="text-center flex-1">
        <h1 class="text-2xl font-black tracking-wide whitespace-nowrap" style="font-family: 'Playfair Display', serif">Vision Bazaar</h1>
        <p class="text-orange-100 text-sm mt-1">Order History</p>
      </div>
      <div class="w-14 shrink-0 text-right">
        <a href="index.html" class="text-orange-100 hover:text-white text-sm font-bold whitespace-nowrap inline-flex items-center h-12">&larr; Back</a>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-3">

    <!-- Summary -->
    <section id="summary" class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
      <div class="grid grid-cols-3 gap-4 text-center">
        <div>
          <div class="text-xs uppercase tracking-wide text-slate-400 font-bold">Orders</div>
          <div id="total-orders" class="text-2xl font-black text-slate-900">0</div>
        </div>
        <div>
          <div class="text-xs uppercase tracking-wide text-slate-400 font-bold">Total Sales</div>
          <div id="total-sales" class="text-2xl font-black text-green-700">$0</div>
        </div>
        <div>
          <div class="text-xs uppercase tracking-wide text-slate-400 font-bold">Zelle / Cash</div>
          <div id="payment-split" class="text-lg font-black text-slate-700">0 / 0</div>
        </div>
      </div>
    </section>

    <!-- Filter -->
    <section class="flex gap-2 flex-wrap items-center">
      <button onclick="toggleItemFilterPanel()" id="item-filter-toggle" class="w-9 h-9 rounded-full text-sm font-bold bg-white border border-slate-200 active:scale-95 transition flex items-center justify-center">🔍</button>
      <button onclick="filterOrders('all')" class="filter-btn px-4 py-2 rounded-full text-sm font-bold bg-blue-900 text-white">All</button>
      <button onclick="filterOrders('Zelle')" class="filter-btn px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-700 border">Zelle</button>
      <button onclick="filterOrders('Cash')" class="filter-btn px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-700 border">Cash</button>
      <button onclick="filterOrders('Cancelled')" class="filter-btn px-4 py-2 rounded-full text-sm font-bold bg-white text-slate-700 border">Cancelled</button>
    </section>
    <section id="item-filter-panel" class="hidden">
      <div class="flex gap-2 mb-2">
        <button onclick="selectAllItems()" class="px-3 py-1 rounded-lg text-xs font-bold bg-slate-100 text-slate-600 active:scale-95 transition">Select All</button>
        <button onclick="clearAllItems()" class="px-3 py-1 rounded-lg text-xs font-bold bg-slate-100 text-slate-600 active:scale-95 transition">Clear</button>
      </div>
      <div id="item-filter" class="flex gap-2 flex-wrap"></div>
    </section>

    <!-- Order List -->
    <section id="order-list" class="space-y-3"></section>

    <div id="empty-state" class="text-center text-slate-400 italic py-12 hidden">
      No orders yet
    </div>

  </main>

  <!-- Edit Modal -->
  <section id="edit-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" onclick="closeEditModal()">
    <div class="bg-white rounded-3xl p-5 shadow-2xl max-w-sm mx-4 w-full max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-black text-lg text-slate-900">Edit Order <span id="edit-order-id"></span></h2>
        <button onclick="closeEditModal()" class="text-slate-400 text-xl font-bold">&times;</button>
      </div>
      <div id="edit-items" class="space-y-2 mb-4"></div>
      <div class="flex justify-between items-center mb-4 pt-3 border-t">
        <span class="font-bold text-slate-700">Total</span>
        <span id="edit-total" class="text-xl font-black text-blue-900">$0</span>
      </div>
      <button onclick="saveEdit()" class="w-full bg-blue-900 text-white py-3 rounded-2xl font-black active:scale-95 transition">Save Changes</button>
    </div>
  </section>

  <script src="js/history.js"></script>
</body>
</html>
